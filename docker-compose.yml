version: '3.9'

networks:
  powerbank-net:
    driver: bridge

services:

  # ─── Databases (one per service) ─────────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  station-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: station_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - station-db-data:/var/lib/postgresql/data
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rental-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rental_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5436:5432"
    volumes:
      - rental-db-data:/var/lib/postgresql/data
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - powerbank-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Keycloak ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - powerbank-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e \"GET /realms/master HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; cat <&3 | grep -q \"200 OK\""]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Kong Gateway (DB-less mode) ─────────────────────────────────────────
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "80:8000"      # Kong proxy
      - "8001:8001"    # Kong admin API
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml
    networks:
      - powerbank-net
    depends_on:
      - user-service
      - payment-service
      - station-service
      - rental-service

  # ─── Spring Boot Services ─────────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: postgres
      DB_PASSWORD: secret
      KAFKA_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: powerbank
      KEYCLOAK_CLIENT_ID: user-service
      KEYCLOAK_CLIENT_SECRET: user-service-secret
      SERVER_PORT: 8081
      # ── Telegram OTP (optional) ───────────────────────────────────────
      # Set TELEGRAM_ENABLED=true and supply bot token + chat ID map to
      # enable real OTP delivery via Telegram. Leave as-is for dev mode.
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-CHANGE_ME}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-{}}
    ports:
      - "8081:8081"
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - powerbank-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: secret
      KAFKA_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: powerbank
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - powerbank-net

  station-service:
    build:
      context: .
      dockerfile: station-service/Dockerfile
    environment:
      DB_HOST: station-db
      DB_PORT: 5432
      DB_NAME: station_db
      DB_USER: postgres
      DB_PASSWORD: secret
      KAFKA_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: powerbank
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      station-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - powerbank-net

  rental-service:
    build:
      context: .
      dockerfile: rental-service/Dockerfile
    environment:
      DB_HOST: rental-db
      DB_PORT: 5432
      DB_NAME: rental_db
      DB_USER: postgres
      DB_PASSWORD: secret
      KAFKA_SERVERS: kafka:29092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: powerbank
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      rental-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - powerbank-net

volumes:
  user-db-data:
  payment-db-data:
  station-db-data:
  rental-db-data:

_format_version: "3.0"
_transform: true

services:
  # ─── User Service ───────────────────────────────────────────────────────
  - name: user-service
    url: http://user-service:8081
    routes:
      - name: auth-phone
        paths: ["/auth/phone"]
        methods: ["POST"]
        strip_path: false
      - name: auth-verify
        paths: ["/auth/verify"]
        methods: ["POST"]
        strip_path: false
      - name: auth-refresh
        paths: ["/v1/auth/refresh"]
        methods: ["POST"]
        strip_path: false
      - name: user-profile
        paths: ["/v1/me"]
        methods: ["GET"]
        strip_path: false

  # ─── Payment Service ─────────────────────────────────────────────────────
  - name: payment-service
    url: http://payment-service:8082
    routes:
      - name: payment-cards
        paths: ["/v1/cards"]
        methods: ["GET", "POST"]
        strip_path: false
      - name: payment-cards-id
        paths: ["~/v1/cards/(?<id>[^/]+)"]
        methods: ["GET", "DELETE"]
        strip_path: false
      - name: payment-payments
        paths: ["/v1/payments"]
        methods: ["GET", "POST"]
        strip_path: false
      - name: payment-payments-id
        paths: ["~/v1/payments/(?<id>[^/]+)"]
        methods: ["GET", "DELETE"]
        strip_path: false

  # ─── Station Service ─────────────────────────────────────────────────────
  - name: station-service
    url: http://station-service:8083
    routes:
      - name: stations-list
        paths: ["/v1/stations"]
        methods: ["GET"]
        strip_path: false
      - name: stations-detail
        paths: ["~/v1/stations/(?<id>[^/]+)"]
        methods: ["GET"]
        strip_path: false

  # ─── Rental Service ──────────────────────────────────────────────────────
  - name: rental-service
    url: http://rental-service:8084
    routes:
      - name: rentals-create
        paths: ["/api/v1/rentals"]
        methods: ["POST"]
        strip_path: false
      - name: rentals-status
        paths: ["~/api/v1/rentals/(?<id>[^/]+)/status"]
        methods: ["GET"]
        strip_path: false
      - name: rentals-history
        paths: ["/api/v1/rentals/history"]
        methods: ["GET"]
        strip_path: false
      - name: rentals-finish
        paths: ["/api/v1/rentals/finish"]
        methods: ["POST"]
        strip_path: false

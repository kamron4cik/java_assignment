spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:powerbank}

server:
  port: ${SERVER_PORT:8081}

keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:powerbank}
  client-id: ${KEYCLOAK_CLIENT_ID:user-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:secret}

otp:
  expiry-minutes: 5

grpc:
  server:
    port: ${GRPC_PORT:9091}

logging:
  level:
    uz.pdp: DEBUG
